<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search in Electoral Roll</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="searchbydetails.css">
</head>
<body>
    
    
        <div class="headimg">
        <center><a href="main.html" style="text-decoration: none;"><img src="lax.jpg" height="100px" width="400px" style="margin: 15px 0px;"></a></center>
        </div>
        <div class="container my-4">
        <div class="header-space">
            <a href="https://voters.eci.gov.in/" style="text-decoration: none;"><h6 style="padding: 10px 10px;">ऑनलाइन आवेदन /APPLY ONLINE</h6></a>
            <div class="home-icon">
                <a href="main.html" style="text-decoration: none;"><span class="fa-solid fa-arrow-right-from-bracket"></span> Home</a>
            </div>
        </div>
        <div class="container pt-4">
            <div class="row">
                <div class="col-md-4">
                    <a href="SEARCH IN ELECTORAL POLL.html" style="text-decoration: none;"><button class="btn btn-primary btn-block btn-lg" style="padding: 10px 50px;">ईपीआईसी द्वारा खोजें/Search by EPIC</button></a>
                </div>
                <div class="col-md-4">
                    <a href="searchbydetails.html" style="text-decoration: none;"><button class="btn btn-success btn-block btn-lg" style="padding: 10px 50px;">विवरण द्वारा खोजें/ Search by Details</button></a>
                </div>
                <div class="col-md-4">
                    <a href="Searchbymobile.html" style="text-decoration: none;"><button class="btn btn-warning btn-block btn-lg" style="padding: 10px 50px;">मोबाइल द्वारा खोजें / Search by Mobile</button></a>
                </div>
            </div>
        </div>

        <form>
            <div class="section border p-3 mb-3">
                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="state" class="form-label">State</label>
                        <select id="state" class="form-select">
                            <option selected>Select Your State</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="language" class="form-label">Select Language</label>
                        <select id="language" class="form-select">
                            <option selected>Select Language</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="section border p-3 mb-3">
                <h5 class="section-title text-primary mb-3">PERSONAL DETAILS</h5>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="firstName" class="form-label">First Name, Middle Name (if any)</label>
                        <input type="text" class="form-control" id="firstName" placeholder="Your First Name">
                    </div>
                    <div class="col-md-6">
                        <label for="lastName" class="form-label">Surname (if any)</label>
                        <input type="text" class="form-control" id="lastName" placeholder="Your Last Name">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="relativeFirstName" class="form-label">Relative's First Name</label>
                        <input type="text" class="form-control" id="relativeFirstName" placeholder="Father's/Husband's First Name">
                    </div>
                    <div class="col-md-6">
                        <label for="relativeLastName" class="form-label">Relative's Last Name</label>
                        <input type="text" class="form-control" id="relativeLastName" placeholder="Father's/Husband's Last Name">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Select Birth Details</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="birthDetail" id="dob" checked>
                            <label class="form-check-label" for="dob">Date of Birth</label>
                        </div>
                        <input type="date" class="form-control mt-2">
                    </div>
                    <div class="col-md-6">
                        <label class="form-label d-block">&nbsp;</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="birthDetail" id="age">
                            <label class="form-check-label" for="age">Age</label>
                        </div>
                        <input type="number" class="form-control mt-2" placeholder="Select Your Age">
                    </div>
                </div>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="gender" class="form-label">Gender</label>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="male" checked>
                            <label class="form-check-label" for="male">Male</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="female">
                            <label class="form-check-label" for="female">Female</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="radio" name="gender" id="thirdGender">
                            <label class="form-check-label" for="thirdGender">Third Gender</label>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section border p-3 mb-3">
                <h5 class="section-title text-primary mb-3">LOCATION DETAILS</h5>

                <div class="row mb-3">
                    <div class="col-md-6">
                        <label for="district" class="form-label">District</label>
                        <select id="district" class="form-select">
                            <option selected>Select Your District</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label for="assemblyConstituency" class="form-label">Assembly Constituency</label>
                        <select id="assemblyConstituency" class="form-select">
                            <option selected>Select Your AC</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- Buttons -->
            <div class="text-center">
                <button type="submit" class="btn btn-primary">Search</button>
                <button type="reset" class="btn btn-secondary">Clear</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
